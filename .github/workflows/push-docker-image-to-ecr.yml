name: Push Docker Image to AWS ECR
on:
  push: # 코드가 저장소로 푸시될 때 - 작동 테스트를 위해 임시 저장
    branches:
      - main
#  pull_request:
#    types: [ closed ]
#    branches:
#      - main
#  workflow_run:
#    workflows: [ "Springboot CI" ] # ci 성공 시
#    types:
#      - completed

jobs:
  Build:
    #    if: github.event.pull_request.merged == true
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set environment variables using $GITHUB_ENV
        run: |
          echo "ECR_REPO=${{ secrets.AWS_ECR_REPO }}" >> $GITHUB_ENV
          echo "IMAGE_TAG=$(git rev-parse --short HEAD)-$(date +'%Y-%m-%d-%H-%M')" >> $GITHUB_ENV
          echo "AWS_REGION=${{ secrets.AWS_REGION }}" >> $GITHUB_ENV

      - name: Validate Environment Variables
        run: |
          echo "ECR_REPO=${{ env.ECR_REPO }}"
          echo "IMAGE_TAG=${{ env.IMAGE_TAG }}"
          echo "AWS_REGION=${{ env.AWS_REGION }}"

      - name: Make Gradle Wrapper executable
        run: chmod +x ./gradlew

      - name: Install dependencies and build the project
        run: |
          ./gradlew clean build -x test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          #          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build the Docker image
        run: |
          docker build -t $ECR_REPO:$IMAGE_TAG .

      - name: Tag the Docker image as latest
        run: |
          docker tag $ECR_REPO:$IMAGE_TAG $ECR_REPO:latest

      - name: Delete existing latest tag in ECR
        run: |
          REPO_NAME="${ECR_REPO##*/}"
          aws ecr batch-delete-image \
            --repository-name "$REPO_NAME" \
            --region "$AWS_REGION" \
            --image-ids imageTag=latest || true

      - name: Push the Docker image to Amazon ECR
        run: |
          docker push $ECR_REPO:$IMAGE_TAG
          docker push $ECR_REPO:latest

      - name: Cleanup Docker images (optional)
        run: |
          docker rmi $ECR_REPO:$IMAGE_TAG || true
          docker rmi $ECR_REPO:latest || true