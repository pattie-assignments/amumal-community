name: Push Docker Image to AWS ECR

#on:
#  workflow_run:
#    workflows: [ "Springboot CI" ]
#    types:
#      - completed

on:
  workflow_dispatch:

permissions: # GITHUB_TOKEN을 사용하여 권한 제어
  contents: read # 리포지토리의 컨텐츠로 작업
  actions: read # github action의 read 작업 허용

jobs:
  Upload:
    name: Push Docker Image from Workflow Artifact to ECR
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-26.04

    env:
      ECR_REPO: ${{ secrets.AWS_ECR_REPO }}
      COMMIT_HASH_VALUE: ${{ github.event.workflow_run.head_sha }}
      AWS_REGION: ${{ secrets.AWS_REGION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Environment Variables
        run: |
          echo "ECR_REPO=$ECR_REPO"
          echo "COMMIT_HASH_VALUE=$COMMIT_HASH_VALUE"
          echo "AWS_REGION=$AWS_REGION"

      - name: Download build artifact from CI
        uses: actions/download-artifact@v8
        with:
          name: build-artifact-${{ github.event.workflow_run.head_sha }}
          path: build/libs
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -t $ECR_REPO:$COMMIT_HASH_VALUE .

      - name: Push Docker image to Amazon ECR
        run: |
          docker push $ECR_REPO:$COMMIT_HASH_VALUE