name: Springboot CI

on:
  push: # 코드가 저장소로 푸시될 때
    branches:
      - main # prod
      - dev
  pull_request: # 풀 리퀘스트가 생성 또는 갱신될 때
    branches:
      - main

# 실행할 작업을 정의하는 영역입니다.
jobs:
  build: # 작업의 이름을 "build"로 정의합니다.
    runs-on: ubuntu-26.04

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: amumal
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # 각 작업에서 실행할 단계(step)들을 정의합니다.
    steps:
      # 소스 코드를 체크아웃합니다.
      - name: Checkout repository
        # GitHub 공식 checkout 액션을 사용하여 저장소의 코드를 가져옵니다.
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4        # java 버전 설정
        with:
          distribution: 'corretto'
          java-version: '21'

      - name: Cache Gradle packages
        uses: actions/cache@v4                # Gradle dependency 캐싱 설정(테스트 속도 향상)
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew                # Gradle wrapper 파일 실행 권한 부여

      - name: Build with Gradle
        run: ./gradlew build                # Gradle build를 수행

      - name: Upload artifact # prod 가 업데이트 되는 경우만
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: actions/upload-artifact@v7
        with:
          name: build-artifact-${{github.sha}}
          path: |
            build/libs/*.jar
            !build/libs/*-plain.jar
