name: Deploy Docker Image from GHCR

#on:
#  workflow_run:
#    workflows: [ "Push Docker Image to AWS ECR" ]
#    types:
#      - completed

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  Deploy:
    name: Deploy via SSM
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-26.04

    env:
      COMMIT_HASH_VALUE: ${{ github.sha }}
      INSTANCE_ID: ${{ secrets.AWS_EC2_INSTANCE_ID }}
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PORT: ${{ secrets.DB_PORT }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_USERNAME: ${{ secrets.DB_USERNAME }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      PORT: ${{ secrets.PORT }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }} # 나중에 packages:read 권한만 있는 토큰으로 변경

    steps:
      # GHCR 이미지 이름 계산 - publish-image.yml이 push할 때 쓰는 것과 동일한 규칙
      - name: Set GHCR image name
        run: |
          IMAGE_REPO="ghcr.io/$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')"
          echo "IMAGE_REPO=$IMAGE_REPO" >> "$GITHUB_ENV"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 서버가 뜰 수 있는지 메모리 체크
      - name: Check server memory before deploy
        env:
          MIN_AVAILABLE_MB: 400 # 임의 기준치
        run: .github/scripts/aws/check-memory.sh

      - name: Send deploy command via SSM
        id: send-command
        run: |
          DEPLOY_SCRIPT=$(
            {
              echo "set -e"
              envsubst \
              '$DB_HOST $DB_PORT $DB_NAME $DB_USERNAME $DB_PASSWORD $IMAGE_REPO $COMMIT_HASH_VALUE $PORT $GHCR_TOKEN $GITHUB_ACTOR' \
              < .github/scripts/remote/docker-deploy.sh
            }
          )
          
          ENCODED_SCRIPT=$(
            printf '%s' "$DEPLOY_SCRIPT" |
            base64 |
            tr -d '\n'
          )
          
          COMMAND_ID=$(
          aws ssm send-command \
          --instance-ids "$INSTANCE_ID" \
          --document-name "AWS-RunShellScript" \
          --comment "Deploy amumal:${COMMIT_HASH_VALUE} from GHCR" \
          --parameters commands="echo $ENCODED_SCRIPT | base64 -d | bash" \
          --query "Command.CommandId" \
          --output text
          )

          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for command to finish
        env:
          COMMAND_ID: ${{ steps.send-command.outputs.command_id }}
        run: |
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" || true
          
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "Status" \
            --output text)
          
          echo "--- stdout ---"
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StandardOutputContent" \
            --output text
          
          echo "--- stderr ---"
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StandardErrorContent" \
            --output text
          
          if [ "$STATUS" != "Success" ]; then
            echo "SSM command finished with status: $STATUS"
            exit 1
          fi