server:
  port: 3000
  servlet:
    context-path: /v1

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:amumal}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  flyway:
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  profiles:
    active: development

app:
  upload:
    base-dir: ./uploads
  seed:
    test-user-count: ${TEST_USER_COUNT:20}
    test-user-password: ${TEST_USER_PASSWORD:Password1!}
  cors:
    allowed-origins:
      - http://localhost:8080
      - http://127.0.0.1:8080
  cookie:
    secure: false

logging:
  level:
    org.hibernate.SQL: debug

jwt:
  secret: 3W8i2bTUFAf+rQtb6SV01OHnNEpqlntH/wfO770lw/gm3n2onNxHNNtbik6mNux7aNlMD0jsZHzdE2mYZe8vlA==
  access-token-exp-seconds: 300
  refresh-token-exp-seconds: 12096000
